<!DOCTYPE html>
<html lang='ja'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>404 Not Found - ページが見つかりません</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 100px 20px;
            color: #333;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>お探しのページが見つかりませんでした。<br>
    URLが間違っているか、ページが削除または移動された可能性があります。</p>
    <a href='/'>トップページへ戻る</a>
</body>
</html>
